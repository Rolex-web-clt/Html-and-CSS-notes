<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Direction Change</title>
    <style>
        .container{
            display: flex;
            gap: 3px;
        }
        @media screen and (max-width:700px){
            .container{
                 display: flex;
                 flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div>A</div>
        <div>B</div>
        <div>C</div>
    </div>
    
</body>
</html>
