<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ModernUI</title>
    <style>
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: black;
        }
      .container{
        height: 500px;
        width: 500px;
        display: grid;
        grid-template-rows: 1fr 2fr 1fr 1fr;
        grid-template-columns: 1fr 1fr 1fr;
        padding: 10px;
        gap: 5px;
      }

      .box{
        background-color: #101ee1;
        }
        .header{
            grid-column-start:1;
            grid-column-end:4 ;
        }
        .content1{
            grid-column-start: 2;
            grid-column-end: 4;
        }
        .content2{
            grid-column-start: 2;
            grid-column-end: 3;
        }
        .sidebar{
            grid-row-start: 2;
            grid-row-end: 4;

        }
        .footer{
            grid-column-start: 1;
            grid-column-end: 4;
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="box header">Header </div>
        <div class="box sidebar"> Sidebar</div>
        <div class="box content1">content1</div>
        <div class="box content2">Content2 </div>
        <div class="box content3">Content3 </div>
        <div class="box footer">Footer </div>
    </div>
    
</body>
</html>
