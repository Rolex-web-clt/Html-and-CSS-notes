<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive</title>
    <style>
          .body{
            font-size: 20px;
          }
          @media screen and (max-width:768px){
            .body{
                font-size:16px;
            }
           @media screen and (max-width:480px) {
            .body{
                font-size: 14px;
            }
           } 
          }
    </style>
</head>
<body>
    <p>Lorem ipsum dolor, sit amet consectetur adipisicing elit. Deserunt minus possimus quibusdam neque nesciunt vel at quae maiores quisquam ullam?</p>
</body>
</html>
