<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transtition</title>
    <style>
        *{
            margin: 0px;
            padding: 0px;
            box-sizing: border-box;
        }
        body{
            background-color: black;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container{
            background-color: gray;
            margin:50px;
            height: 400px;
            width:400px;
            display:flex;
            justify-content: center;
            align-items: center;
            perspective: 800px;
        
        }
        .box{
            height:150px;
            width:150px;
            background-color: purple;
        
           cursor: pointer;
           transition: all 8s;
        }
        .box:hover{
            background: blue;
            /* transform:skewX(36deg); */
            /* transform: rotateX(360deg); */
            transform: rotateY(-90deg);
    
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box"></div>
    </div>
</body>
</html>
