<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid</title>
    <style>
        .container{
            display: grid;
            grid-template-rows: 1fr 1fr;
            grid-template-columns: 1fr 2fr;
            height: 400px;
            width: 400px;
            background-color: rgb(20, 129, 201);
            gap: 10px;
            padding: 10px;

        }
        .first{
           background-color: rgb(77, 88, 62)
        }
        .second{
           background-color: rgb(24, 23, 22)
        }
        .third{
           background-color: rgb(52, 12, 123)
        }
        .fourth{
           background-color: rgb(191, 59, 23)
        }
    </style>
</head>
<body>
    <div class="container">
<div class="first"></div>
<div class="second"></div>
<div class="third"></div>
<div class="fourth"></div>
    </div>

    
</body>
</html>
