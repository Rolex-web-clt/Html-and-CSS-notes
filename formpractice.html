<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form and Form validation</title>
</head>
<body>
    <form action="" method="post">
    <h1>Student Registration Form</h1>
    <label for="name">Name</label>
    <input type="text" id="name" placeholder="Enter your name:" minlength="5" maxlength="20" name="name">
    <br>
    <label for="age">Age</label>
   <input type="number" id="age" min="1" max="100" name="age">
   <br>
   <label for="email">Email</label>
    <input type="email" id="email" name="email" placeholder="Enter your email address" required>
    <br>
    <label for="password">Password</label>
    <input type="text" id="password" minlength="8" required>
    <br>
   
    <br>
    <h1>Creating a Form with :</h1>
    <label >Gender</label>
    <label for="Male">
    <input type="radio" id="Male" name="gender" value="Male" />Male </label>
    <label for="Female">
    <input type="radio" id="Female" name="gender" value="Female" />Female </label>
    <label for="Other">
    <input type="radio" id="Other" name="gender" value="Other" />Other </label>
    <br>
    <label >Hobbies</label>
    <label >
    <input type="checkbox" name="hobbies" checked>Music
    <input type="checkbox" name="hobbies" >Games
    <input type="checkbox" name="hobbies" >Videos
    <input type="checkbox" name="hobbies" >Coding
    <input type="checkbox" name="hobbies" >Watching Movies
    <input type="checkbox" name="hobbies" >Visting Temples
</label>
<br>
<label for="Country">Country
    <Select id="Country" name="Countries">
        <option value="" disabled selected >Enter your country Name</option>
    <option value="Nepal">Nepal</option>
    <option value="india">India</option>
    <option value="Vietnam">Vietnam</option>
    <option value="Lux">Lux</option>
    <option value="Nepal">Nepal</option> 
</Select>
</label>
<br>
<label for="text">Write about Yourself</label>
<textarea  id="text" placeholder="Write something important which can be useful to us for secure your Future" minlength="30" required rows="10" cols="20"></textarea>

<label for="search">Movies</label>
<input type="search" id="search" list="Movies">
<datalist id="Movies">
    <option value="PK">
    <option value="LK">
    <option value="mK">
    <option value="OK">
    <option value="PK">

</datalist>  
<br>
<input title="save"  type="submit" value="Save Profile">
    <br>
</form>
</body>
</html>
