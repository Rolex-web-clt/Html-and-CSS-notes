<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mediaquery</title>
    <style>
        *{
            margin: 0px;
            padding: 0px;
            box-sizing: border-box;
        }
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            height:100vh;
            background-color: black;
        }
      .container{
        height:200px;
        width:800px;
        display: grid;
        grid-template-columns: 1fr 1fr 1fr 1fr;
        grid-template-rows: 1fr;
        gap:2px;
        padding:10px;
        align-items: center;
    
      }

      .box1{
    height: 200px;
    width: 200px;
        background-color: purple;
      }
      .box2{
        height: 200px;
        width: 200px;
        background-color: red;
      }
      .box3{
        height: 200px;
        width: 200px;
        background-color: greenyellow;

      }
      .box44{
        height: 200px;
        width: 200px;
        background-color: lightcoral;
      }
      @media screen and (max-width:900px){
        .container{
            height:400px;
            width: 400px;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
        }
   @media  screen and (max-width:600px) {
    .container{
        height: 200px;
        width: 800px;
        grid-template-rows:1fr 1fr 1fr 1fr;
        grid-template-columns: 1fr;
    }
    @media screen and (min-width:900px) {
        .container{
            height: 800px;
            width: 800px;
            grid-template-rows: 1fr;
            grid-template-columns: 1fr 1fr 1fr 1fr;
        }
        
    }
   }
      }
    </style>
</head>
<body>
    <div class="container">
        <div class="box1"></div>
        <div class="box2"></div>
        <div class="box3"></div>
        <div class="box44"></div>
    </div>

</body>
</html>
