<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid using flexbox</title>
    <style>
        body{
            background-color:black;
        }
        .container{
            display: flex;
            padding: 10px;
            gap: 10px;
        }
         .box3{
            height: 200px;
            width: 200px;
            background-color: aquamarine;

         }  
         .box{
            height: 200px;
            width:200px;
            display: flex;
            flex-direction: column;
            gap: 10px;
         }
         .first{
            height: 100px;
            background-color: blueviolet;
         }
         .second{
            height: 100px;
            background-color: brown;
         }
    </style>
</head>
<body>
    <div class="container">
        <div class="box3">box1</div>
        <div class="box">
            <div class="first">
                yeh
            </div>
            <div class="second">
                nop
            </div>
        </div>
    </div>
    
</body>
</html>
