<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boxes</title>
    <style>
         .container{
            height: 800px;
            width: 800px;
            display: grid;
            grid-template-rows: 1fr;
            grid-template-columns: repeat(4,1fr);
            gap: 2px;
         }
         .box1{
            height: 200px;
            width: 200px;
            background-color: purple;
         }
         .box2{
            height: 200px;
            width: 200px;
            background-color: rgb(16, 6, 16);
         }
         .box3{
            height: 200px;
            width: 200px;
            background-color: rgb(219, 150, 219);
         }
         .box4{
            height: 200px;
            width: 200px;
            background-color: rgb(5, 18, 81);
         }
       
        @media screen and (max-width:900px) {
            .container{
                height: 400px;
                width: 400px;
                grid-template-columns: 1fr 1fr;
                grid-template-rows: 1fr 1fr;
            }
            @media screen and (max-width:500px) {
                
            .container{
                height: 200px;
                width: 200px;
                grid-template-rows: repeat(4,1fr);
                grid-template-columns: 1fr;
            }
        }
            
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box1"></div>
        <div class="box2"></div>
        <div class="box3"></div>
        <div class="box4"></div>
    </div>
    
</body>
</html>
